<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DShare Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <div class="login-box">
        <h2>DShare Login</h2>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email address">
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button id="loginBtn">Sign In</button>
        
        <button class="google-btn" id="googleLogin">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84a4.14 4.14 0 0 1-1.8 2.71v2.26h2.91c1.7-1.57 2.69-3.87 2.69-6.62z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.91-2.26c-.8.54-1.83.85-3.05.85-2.34 0-4.32-1.58-5.03-3.71H.95v2.35A8.996 8.996 0 0 0 9 18z" fill="#34A853"/>
                <path d="M3.97 10.7a5.4 5.4 0 0 1 0-3.4V4.95H.95a8.996 8.996 0 0 0 0 8.1l3.02-2.35z" fill="#FBBC05"/>
                <path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0 5.48 0 2.44 2.02.95 4.95l3.02 2.35c.71-2.13 2.69-3.71 5.03-3.71z" fill="#EA4335"/>
            </svg>
            Continue with Google
        </button>
        
        <div class="form-footer">
            <a href="signup.html">Don't have an account? Sign up</a>
        </div>
    </div>

    <script type="module" src="../js/login.js"></script>
</body>
</html>
